<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約システム</title>
    <style>
        :root { --main-color: #5d4037; --accent-color: #ff7e50; --bg-color: #efebe9; --line-color: #bbb; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg-color); color: #3e2723; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--main-color); margin-bottom: 15px; }

        .input-area { background: #fdfdfd; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #d7ccc8; }
        label { font-weight: bold; font-size: 0.8em; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }

        .table-wrapper { overflow-x: auto; border: 1px solid var(--line-color); border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; table-layout: fixed; }
        th, td { border: 1px solid #ddd; padding: 10px 2px; text-align: center; font-size: 0.85em; }
        th { background: #f8f8f8; position: sticky; top: 0; z-index: 10; }
        
        .time-col { width: 65px; background: #eee; font-weight: bold; border-right: 2px solid var(--line-color) !important; }
        tr.hour-border td { border-top: 1.5px solid var(--line-color); }

        .status-ok { color: var(--accent-color); font-weight: bold; cursor: pointer; font-size: 1.4em; }
        .status-ng-past { color: #e0e0e0; font-size: 1.1em; } /* 過去：薄いグレー× */
        .status-ng-booked { color: #e57373; font-size: 1.2em; font-weight: bold; } /* 予約済：赤× */
        
        /* 休業日の特別スタイル */
        .holiday-cell { background: #f5f5f5; color: #aaa; font-size: 1.1em; font-weight: bold; letter-spacing: 0.5em; writing-mode: vertical-rl; text-orientation: upright; padding: 20px 0; }

        .sun { color: #d32f2f; } .sat { color: #1976d2; }
        #confirm-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:2000; }
        .modal-content { background:white; padding:25px; border-radius:20px; width:85%; max-width:350px; text-align:center; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 予約状況</h2>
    <div class="input-area">
        <label>お名前</label><input type="text" id="user-name">
        <label>電話番号</label><input type="tel" id="user-tel">
        <label>メニュー</label>
        <select id="user-menu">
            <option value="整体60分 ¥6000">整体 60分 ¥6000</option>
            <option value="整体90分 ¥9000">整体 90分 ¥9000</option>
            <option value="もみほぐし60分 ¥6000">もみほぐし 60分 ¥6000</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table id="reserve-table">
            <thead><tr id="table-header"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="confirm-modal"><div class="modal-content">
    <h3>予約内容の確認</h3>
    <div id="confirm-text" style="text-align:left; margin:15px 0;"></div>
    <button id="final-ok-btn" style="background:var(--main-color); color:white; border:none; padding:12px; border-radius:25px; width:100%; font-weight:bold; cursor:pointer;">予約を確定する</button>
    <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer;">戻る</button>
</div></div>
