<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約システム</title>
    <style>
        :root { --main-color: #5d4037; --accent-color: #ff7e50; --bg-color: #efebe9; --line-color: #bbb; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg-color); color: #3e2723; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--main-color); margin-bottom: 10px; }
        
        .week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #f8f8f8; padding: 10px; border-radius: 10px; }
        .nav-btn { background: var(--main-color); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }
        #current-week-display { font-weight: bold; }

        .input-area { background: #fdfdfd; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #d7ccc8; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }

        .table-wrapper { overflow-x: auto; border: 1px solid var(--line-color); border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; table-layout: fixed; }
        th, td { border: 1px solid #ddd; padding: 10px 2px; text-align: center; font-size: 0.85em; height: 42px; }
        th { background: #f8f8f8; position: sticky; top: 0; z-index: 10; }
        
        .time-col { width: 65px; background: #eee; font-weight: bold; border-right: 2px solid var(--line-color) !important; }
        tr.hour-border td { border-top: 1.5px solid var(--line-color); }

        .status-ok { color: var(--accent-color); font-weight: bold; cursor: pointer; font-size: 1.4em; }
        .status-ng-past { color: #e0e0e0; font-size: 1.1em; font-weight: bold; }
        .status-ng-booked { color: #e57373; font-size: 1.2em; font-weight: bold; }
        
        /* 休業日：縦線は残し、横線のみ消去 */
        .holiday-cell { 
            background: #f5f5f5; 
            color: #aaa; 
            vertical-align: middle; 
            border-top: none !important; 
            border-bottom: none !important; 
        }
        .v-text { writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 0.2em; font-weight: bold; white-space: nowrap; font-size: 1.1em; display: inline-block; }

        .sun { color: #d32f2f; } .sat { color: #1976d2; }
        #confirm-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:2000; }
        .modal-content { background:white; padding:25px; border-radius:20px; width:85%; max-width:350px; text-align:center; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 予約状況</h2>
    <div class="week-nav">
        <button id="prev-btn" class="nav-btn" onclick="changeWeek(-7)">＜ 前週</button>
        <div id="current-week-display"></div>
        <button id="next-btn" class="nav-btn" onclick="changeWeek(7)">翌週 ＞</button>
    </div>
    <div class="input-area">
        <input type="text" id="user-name" placeholder="お名前">
        <input type="tel" id="user-tel" placeholder="電話番号">
        <select id="user-menu">
            <option value="整体60分 ¥6000">整体 60分 ¥6000</option>
            <option value="整体90分 ¥9000">整体 90分 ¥9000</option>
            <option value="もみほぐし60分 ¥6000">もみほぐし 60分 ¥6000</option>
        </select>
    </div>
    <div class="table-wrapper">
        <table id="reserve-table">
            <thead><tr id="table-header"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="confirm-modal"><div class="modal-content">
    <h3>予約内容の確認</h3>
    <div id="confirm-text" style="text-align:left; margin:15px 0;"></div>
    <button id="final-ok-btn" style="background:var(--main-color); color:white; border:none; padding:12px; border-radius:25px; width:100%; font-weight:bold; cursor:pointer;">予約を確定する</button>
    <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer;">戻る</button>
</div></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbywNPCyhk0tyin9vyBratW1HMoUmKyGK_gfrQC_455JYEMnnWFC3p_E5Dflg9869Bf7iQ/exec";
    const daysArr = ['日','月','火','水','木','金','土'];
    let busySlots = [];
    let startOffset = 0;

    window.onload = async function() {
        if(localStorage.getItem('reserve-name')) document.getElementById('user-name').value = localStorage.getItem('reserve-name');
        if(localStorage.getItem('reserve-tel')) document.getElementById('user-tel').value = localStorage.getItem('reserve-tel');
        try {
            const res = await fetch(GAS_URL);
            busySlots = await res.json();
        } catch(e) {}
        buildTable();
    };

    function changeWeek(diff) {
        startOffset += diff;
        if (startOffset < 0) startOffset = 0;
        buildTable();
    }

    function buildTable() {
        const header = document.getElementById('table-header');
        const body = document.getElementById('table-body');
        const weekDisplay = document.getElementById('current-week-display');
        const nowMs = Date.now();
        const dates = [];

        document.getElementById('prev-btn').disabled = (startOffset <= 0);

        header.innerHTML = '<th class="time-col">時間</th>';
        for (let i = 0; i < 7; i++) {
            const d = new Date();
            d.setHours(0,0,0,0); // 判定用に時間をリセット
            d.setDate(d.getDate() + startOffset + i);
            
            const iso = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
            
            // 休業日の判定ロジックを修正
            const isHoliday = busySlots.some(s => {
                if (!s.isLongEvent) return false;
                const sDate = new Date(s.start);
                return sDate.getFullYear() === d.getFullYear() && 
                       sDate.getMonth() === d.getMonth() && 
                       sDate.getDate() === d.getDate();
            });

            dates.push({ y:d.getFullYear(), m:d.getMonth(), d:d.getDate(), iso:iso, isHoliday:isHoliday });
            const dayClass = d.getDay() === 0 ? 'sun' : (d.getDay() === 6 ? 'sat' : '');
            header.innerHTML += `<th>${d.getMonth()+1}/${d.getDate()}<br><span class="${dayClass}">(${daysArr[d.getDay()]})</span></th>`;
            if(i === 0) weekDisplay.innerText = `${d.getFullYear()}年 ${d.getMonth()+1}月`;
        }

        let rows = "";
        for (let h = 9; h <= 18; h++) {
            for (let m = 0; m <= 45; m += 15) {
                if (h === 9 && m < 30) continue;
                const timeStr = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                let row = `<tr class="${m === 0 ? 'hour-border' : ''}"><td class="time-col">${timeStr}</td>`;
                
                dates.forEach(dateObj => {
                    if (dateObj.isHoliday) {
                        const text = (h === 14 && m === 0) ? '<span class="v-text">休業日</span>' : '';
                        row += `<td class="holiday-cell">${text}</td>`;
                    } else {
                        const ct = new Date(dateObj.y, dateObj.m, dateObj.d, h, m).getTime();
                        // 予約済み判定ロジックを修正
                        const busy = busySlots.find(s => !s.isLongEvent && ct >= s.start && ct < s.end);
                        
                        if (ct < nowMs) row += `<td><span class="status-ng-past">×</span></td>`;
                        else if (busy) row += `<td><span class="status-ng-booked">×</span></td>`;
                        else row += `<td><span class="status-ok" onclick="openConfirm('${dateObj.iso}', '${timeStr}')">◎</span></td>`;
                    }
                });
                rows += row + "</tr>";
            }
        }
        body.innerHTML = rows + `<tr><td class="time-col">19:00</td>${dates.map(() => '<td></td>').join('')}</tr>`;
    }

    function openConfirm(date, time) {
        const n = document.getElementById('user-name').value;
        const t = document.getElementById('user-tel').value;
        const m = document.getElementById('user-menu').value;
        if(!n || !t) return alert("入力してください");
        localStorage.setItem('reserve-name', n); localStorage.setItem('reserve-tel', t);
        document.getElementById('confirm-text').innerHTML = `${date} ${time}〜<br>${m}<br>${n}様`;
        document.getElementById('confirm-modal').style.display = 'flex';
        document.getElementById('final-ok-btn').onclick = () => submit(n, t, m, date, time);
    }
    function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }
    async function submit(name, tel, menu, date, time) {
        closeModal();
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ name, tel, menu, date, time }) });
        alert("予約完了"); location.reload();
    }
</script>
</body>
</html>
