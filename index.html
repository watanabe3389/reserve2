<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#fff; font-family: sans-serif; color: #333; margin: 0; padding: 0; }
        .header { background: #fff; padding: 10px; border-bottom: 2px solid #f0f0f0; text-align: center; font-weight: bold; font-size: 14px; }
        
        .reserve-wrapper { display: flex; overflow: hidden; border-top: 1px solid #ddd; height: calc(100vh - 45px); }
        
        /* 左側の時間軸 */
        .time-column { width: 65px; flex-shrink: 0; background: #f9f9f9; border-right: 1px solid #ddd; overflow-y: hidden; }
        .time-cell { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 12px; border-bottom: 1px solid #eee; color: #666; font-weight: bold; }
        .time-header { height: 60px; border-bottom: 1px solid #ddd; background: #f9f9f9; }

        /* 右側の表エリア */
        .scroll-container { flex-grow: 1; overflow: auto; -webkit-overflow-scrolling: touch; }
        .table-inner { display: flex; width: max-content; }
        .day-column { width: 85px; text-align: center; border-right: 1px solid #eee; }
        
        .day-header { height: 60px; padding-top: 8px; border-bottom: 1px solid #ddd; background: #fff; position: sticky; top: 0; z-index: 5; }
        .day-date { font-size: 11px; color: #888; }
        .day-name { font-size: 14px; font-weight: bold; }

        .slot-cell { height: 50px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .ok { color: #e91e63; font-weight: bold; } 
        .ng { color: #ccc; font-size: 16px; }      
        
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
</head>
<body>

<div class="header">ご来店日時を選択（9:30〜20:00）</div>

<div id="loader">
    <div class="spinner-border text-danger"></div>
    <p>空き状況を確認中...</p>
</div>

<div class="reserve-wrapper" id="reserve-ui" style="display: none;">
    <div class="time-column" id="time-labels"></div>
    <div class="scroll-container" id="main-scroll">
        <div class="table-inner" id="calendar-content"></div>
    </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    const LIFF_ID = "2009899900-IuADazqV";
    
    // 設定：開始 9:30 / 終了 20:00
    const START_H = 9;  const START_M = 30;
    const END_H = 20;    const END_M = 0;

    window.onload = function() {
        liff.init({ liffId: LIFF_ID }).then(() => { fetchData(); });
    };

    function fetchData() {
        // 時間軸（左側）の生成
        let timeHtml = '<div class="time-header"></div>';
        for (let h = START_H; h <= END_H; h++) {
            for (let m = 0; m < 60; m += 15) {
                if (h === START_H && m < START_M) continue;
                if (h === END_H && m >= END_M) break;
                timeHtml += `<div class="time-cell">${h}:${('0'+m).slice(-2)}</div>`;
            }
        }
        document.getElementById('time-labels').innerHTML = timeHtml;

        google.script.run.withSuccessHandler(json => {
            const data = JSON.parse(json);
            renderTable(data);
        }).getWeeklySlots();
    }

    function renderTable(data) {
        let html = '';
        data.forEach(day => {
            html += `<div class="day-column">`;
            html += `<div class="day-header"><div class="day-date">${day.dd.split('/')[0]}月</div><div class="day-name">${day.dd.split('/')[1]}</div></div>`;
            
            for (let h = START_H; h <= END_H; h++) {
                for (let m = 0; m < 60; m += 15) {
                    if (h === START_H && m < START_M) continue;
                    if (h === END_H && m >= END_M) break;
                    
                    let t = h + ":" + ('0'+m).slice(-2);
                    let isAvailable = day.s.includes(t);
                    if(isAvailable) {
                        html += `<div class="slot-cell ok" onclick="res('${day.d}','${t}')">◎</div>`;
                    } else {
                        html += `<div class="slot-cell ng">×</div>`;
                    }
                }
            }
            html += `</div>`;
        });
        document.getElementById('calendar-content').innerHTML = html;
        document.getElementById('loader').style.display = 'none';
        document.getElementById('reserve-ui').style.display = 'flex';
        
        // スクロール連動設定（時間を固定するため）
        const scrollContainer = document.getElementById('main-scroll');
        const timeLabels = document.getElementById('time-labels');
        scrollContainer.onscroll = function() {
            timeLabels.scrollTop = scrollContainer.scrollTop;
        };
    }

    function res(d, t) {
        if (confirm(d+' '+t+' で予約しますか？')) {
            google.script.run.withSuccessHandler(() => {
                alert('予約完了！');
                liff.closeWindow();
            }).addReservation(d, t);
        }
    }
</script>
</body>
</html>
