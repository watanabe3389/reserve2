<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約システム</title>
    <style>
        :root { --main-color: #5d4037; --accent-color: #ff7e50; --bg-color: #efebe9; --line-color: #bbb; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg-color); color: #3e2723; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--main-color); margin-bottom: 15px; }

        .input-area { background: #fdfdfd; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #d7ccc8; }
        label { font-weight: bold; font-size: 0.8em; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }

        .table-wrapper { overflow-x: auto; border: 1px solid var(--line-color); border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; table-layout: fixed; }
        th, td { border: 1px solid #ddd; padding: 10px 2px; text-align: center; font-size: 0.85em; height: 42px; overflow: hidden; }
        th { background: #f8f8f8; position: sticky; top: 0; z-index: 10; }
        
        .time-col { width: 65px; background: #eee; font-weight: bold; border-right: 2px solid var(--line-color) !important; }
        tr.hour-border td { border-top: 1.5px solid var(--line-color); }

        .status-ok { color: var(--accent-color); font-weight: bold; cursor: pointer; font-size: 1.4em; }
        .status-ng-past { color: #e0e0e0; font-size: 1.1em; font-weight: bold; }
        .status-ng-booked { color: #e57373; font-size: 1.2em; font-weight: bold; }
        
        /* 休業日のスタイル：枠線を消して繋がって見せる */
        .holiday-cell { 
            background: #f5f5f5; 
            color: #aaa; 
            font-size: 1.1em; 
            font-weight: bold; 
            border-top: none !important; 
            border-bottom: none !important;
            vertical-align: middle;
        }
        /* 縦書き用スパン */
        .v-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 0.3em;
            display: inline-block;
        }

        .sun { color: #d32f2f; } .sat { color: #1976d2; }
        #confirm-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:2000; }
        .modal-content { background:white; padding:25px; border-radius:20px; width:85%; max-width:350px; text-align:center; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 予約状況</h2>
    <div class="input-area">
        <label>お名前</label><input type="text" id="user-name">
        <label>電話番号</label><input type="tel" id="user-tel">
        <label>メニュー</label>
        <select id="user-menu">
            <option value="整体60分 ¥6000">整体 60分 ¥6000</option>
            <option value="整体90分 ¥9000">整体 90分 ¥9000</option>
            <option value="もみほぐし60分 ¥6000">もみほぐし 60分 ¥6000</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table id="reserve-table">
            <thead><tr id="table-header"></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="confirm-modal"><div class="modal-content">
    <h3>予約内容の確認</h3>
    <div id="confirm-text" style="text-align:left; margin:15px 0;"></div>
    <button id="final-ok-btn" style="background:var(--main-color); color:white; border:none; padding:12px; border-radius:25px; width:100%; font-weight:bold; cursor:pointer;">予約を確定する</button>
    <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer;">戻る</button>
</div></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbywNPCyhk0tyin9vyBratW1HMoUmKyGK_gfrQC_455JYEMnnWFC3p_E5Dflg9869Bf7iQ/exec";
    const daysArr = ['日','月','火','水','木','金','土'];
    let busySlots = [];
    const dates = [];

    window.onload = async function() {
        if(localStorage.getItem('reserve-name')) document.getElementById('user-name').value = localStorage.getItem('reserve-name');
        if(localStorage.getItem('reserve-tel')) document.getElementById('user-tel').value = localStorage.getItem('reserve-tel');
        try {
            const res = await fetch(GAS_URL);
            busySlots = await res.json();
        } catch(e) { console.error(e); }
        buildTable();
    };

    function buildTable() {
        const header = document.getElementById('table-header');
        const body = document.getElementById('table-body');
        const nowMs = new Date().getTime();

        // 1. 日付列の準備
        header.innerHTML = '<th class="time-col">時間</th>';
        for (let i = 0; i < 7; i++) {
            const d = new Date(); d.setDate(d.getDate() + i);
            const iso = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
            const isHoliday = busySlots.some(s => s.isLongEvent && new Date(s.start).toLocaleDateString('sv-SE') === iso);
            dates.push({ y:d.getFullYear(), m:d.getMonth(), d:d.getDate(), iso:iso, isHoliday:isHoliday });
            
            const th = document.createElement('th');
            const dayClass = d.getDay() === 0 ? 'sun' : (d.getDay() === 6 ? 'sat' : '');
            th.innerHTML = `${d.getMonth()+1}/${d.getDate()}<br><span class="${dayClass}">(${daysArr[d.getDay()]})</span>`;
            header.appendChild(th);
        }

        // 2. 時間行を一つずつ作成（エラー回避のため条件分岐をシンプルに）
        let rowsHtml = "";
        for (let t = 9.5; t <= 19.0; t += 0.25) {
            const h = Math.floor(t);
            const m = (t % 1) * 60;
            const timeStr = h.toString().padStart(2,'0') + ":" + m.toString().padStart(2,'0');
            
            let row = `<tr class="${m === 0 ? 'hour-border' : ''}">`;
            row += `<td class="time-col">${timeStr}</td>`; // 時間列を確定

            dates.forEach((dateObj) => {
                if (dateObj.isHoliday) {
                    // 14:00の行にだけ文字を入れる。それ以外は空のセル。
                    const text = (timeStr === "14:00") ? '<span class="v-text">休業日</span>' : '';
                    row += `<td class="holiday-cell">${text}</td>`;
                } else {
                    const checkTime = new Date(dateObj.y, date
